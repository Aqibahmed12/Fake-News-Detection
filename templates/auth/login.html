{% extends "base.html" %}
{% block title %}Login | TruthLens{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <a href="{{ url_for('web.index') }}" class="auth-logo">
          <span class="brand-icon">🔍</span>
          <span class="brand-name">TruthLens</span>
        </a>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to access your dashboard</p>
      </div>

      <form action="{{ url_for('web.login') }}" method="POST" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('password')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('web.register') }}">Sign up free</a></p>
        <p class="demo-hint">Demo: <code>admin@fakenews.local</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
